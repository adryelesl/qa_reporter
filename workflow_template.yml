name: Daily QA and Jira Integration 🚀

on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: 'Jira Issue Key (e.g., TEST-123)'
        required: false
        default: ''
      tags:
        description: 'Robot Framework Tags to include (e.g., frontend T001)'
        required: false
        default: ''
  repository_dispatch:
    types: [jira_trigger]
  schedule:
    - cron: '0 11 * * *'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip 📦
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache Playwright Browsers 🌐
      uses: actions/cache@v3
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        
        # 📦 Install Library
        # OPTION 1: From Private Git Repo (Recommended)
        # pip install git+https://${{ secrets.GH_PAT }}@github.com/YOUR_ORG/qa-reporter.git
        
        # OPTION 2: From Local Source (If repo is cloned)
        # pip install -e .

        # Install project requirements
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        rfbrowser init

    - name: Run Robot Tests 🤖
      run: |
        # 🏷️ Advanced Tag Parsing (AND Logic for Category + IDs)
        INPUT_TAGS="${{ github.event.inputs.tags || github.event.client_payload.tags }}"
        
        # Use Python to generate the correct Robot -i flags
        # Using 'AND' instead of '&' to avoid shell special character issues
        ROBOT_OPTIONS=$(python3 -c "
        import sys, re
        raw_tags = '$INPUT_TAGS'.strip()
        if not raw_tags: 
            print('-d results')
            sys.exit(0)
            
        tags = raw_tags.split()
        categories = ['frontend', 'backend', 'api', 'ui', 'e2e']
        current_cat = None
        filters = []
        
        for t in tags:
            t_lower = t.lower()
            if t_lower in categories:
                current_cat = t_lower
            elif re.match(r'^T\d+$', t, re.I):
                if current_cat:
                    # Use AND keyword, and wrap in quotes for the shell
                    filters.append(f'\\\"{current_cat} AND {t}\\\"')
                else:
                    filters.append(t)
            else:
                filters.append(t)
        
        # If we found no specific IDs but have a category, run the whole category
        if not filters and current_cat:
            filters.append(current_cat)
            
        opts = ['-d results']
        opts.extend([f'-i {f}' for f in filters])
        print(' '.join(opts))
        ")

        echo "🚀 Running Robot with: $ROBOT_OPTIONS"
        # 📺 xvfb-run is required for browser tests in CI
        # 🔗 eval is used to correctly handle the escaped quotes in ROBOT_OPTIONS
        eval "xvfb-run python -m robot $ROBOT_OPTIONS features/" || true 
        # We allow failure (|| true) so the report step still runs

    - name: Generate Report and Sync to Jira 📊
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        
        JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
        JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
        JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        # Dynamic Issue Key from Manual Input or Webhook
        JIRA_ISSUE_KEY: ${{ github.event.inputs.issue_key || github.event.client_payload.issue_key || secrets.JIRA_ISSUE_KEY }}
        # Tags for Synthetic Skip logic
        REQUESTED_TAGS: ${{ github.event.inputs.tags || github.event.client_payload.tags }}
      run: |
        echo "Updating Jira Issue: $JIRA_ISSUE_KEY"
        # Run your consumer script
        qa-reporter
